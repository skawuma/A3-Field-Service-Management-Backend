spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

storage:
  local-root: uploads

app:
  bootstrap-demo-data: ${APP_BOOTSTRAP_DEMO_DATA:false}
  realtime:
    sla-monitor-delay-ms: ${APP_REALTIME_SLA_MONITOR_DELAY_MS:60000}
    sla-monitor-initial-delay-ms: ${APP_REALTIME_SLA_MONITOR_INITIAL_DELAY_MS:15000}
